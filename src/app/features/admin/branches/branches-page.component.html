<div class="page">

  <div class="page-header">
    <div>
      <h1 class="page-title">Sucursales</h1>
      <p class="page-subtitle">Configuración de sedes y duración de citas</p>
    </div>
    <button mat-flat-button color="primary" (click)="openCreate()">
      <mat-icon>add</mat-icon>
      Nueva sucursal
    </button>
  </div>

  @if (store.loading()) {
    <mat-progress-bar mode="indeterminate" class="progress" />
  }

  <div class="table-card">
    <table mat-table [dataSource]="rows()">

      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>Nombre</th>
        <td mat-cell *matCellDef="let row">
          <div class="branch-name-cell">
            <div class="branch-icon">
              <mat-icon>business</mat-icon>
            </div>
            <span>{{ row.name }}</span>
          </div>
        </td>
      </ng-container>

      <ng-container matColumnDef="duration">
        <th mat-header-cell *matHeaderCellDef>Duración de cita</th>
        <td mat-cell *matCellDef="let row">
          <span class="duration-badge">{{ row.appointmentDurationMinutes }} min</span>
        </td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let row" class="actions-cell">
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;" class="data-row"></tr>

    </table>

    @if (!store.loading() && rows().length === 0) {
      <div class="empty-state">
        <mat-icon>business</mat-icon>
        <span>No hay sucursales registradas</span>
      </div>
    }

    <mat-paginator
      [length]="totalElements()"
      [pageSize]="pageSize()"
      [pageIndex]="pageIndex()"
      [pageSizeOptions]="[10, 15, 25]"
      (page)="onPage($event)"
      showFirstLastButtons />
  </div>

</div>
