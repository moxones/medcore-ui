<div class="kpi-top">
  <div class="kpi-icon">
    <mat-icon>{{ icon() }}</mat-icon>
  </div>
  @if (hint() && !loading()) {
    <span class="kpi-hint">{{ hint() }}</span>
  }
</div>

@if (loading()) {
  <span class="kpi-skeleton"></span>
} @else {
  <span class="kpi-value">{{ value() }}</span>
}

<span class="kpi-label">{{ label() }}</span>
